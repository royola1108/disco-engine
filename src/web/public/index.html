<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Disco Elysium — Live Observer</title>
<style>
  :root {
    --bg: #1a1a2e; --panel: #16213e; --text: #e0e0e0; --dim: #8899aa;
    --accent: #e94560; --success: #4ecca3; --fail: #e94560; --gold: #f5a623;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font: 14px/1.6 'Segoe UI', sans-serif; display: flex; height: 100vh; }
  #dialogue { flex: 1; overflow-y: auto; padding: 20px; }
  #sidebar { width: 320px; background: var(--panel); padding: 16px; overflow-y: auto; border-left: 1px solid #2a2a4a; }
  .entry { margin-bottom: 12px; padding: 8px 12px; border-radius: 6px; }
  .entry.text { background: rgba(255,255,255,0.04); }
  .entry.text .actor { font-weight: 600; color: var(--accent); margin-bottom: 2px; }
  .entry.check { background: rgba(245,166,35,0.1); border-left: 3px solid var(--gold); }
  .entry.check .pass { color: var(--success); }
  .entry.check .fail { color: var(--fail); }
  .entry.choose { background: rgba(78,204,163,0.1); border-left: 3px solid var(--success); font-style: italic; }
  .entry.var { font-size: 12px; color: var(--dim); padding: 2px 12px; }
  .entry.scene-end { color: var(--dim); text-align: center; border-top: 1px solid #333; margin-top: 16px; padding-top: 12px; }
  .options { background: rgba(233,69,96,0.08); border-radius: 8px; padding: 12px; margin: 16px 0; }
  .options h3 { color: var(--accent); font-size: 13px; margin-bottom: 8px; text-transform: uppercase; }
  .option { padding: 6px 8px; border-radius: 4px; cursor: default; }
  .option:hover { background: rgba(255,255,255,0.06); }
  .option .idx { color: var(--gold); font-weight: 700; margin-right: 6px; }
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px; }
  .stat { background: rgba(255,255,255,0.03); padding: 6px 8px; border-radius: 4px; font-size: 12px; }
  .stat .label { color: var(--dim); font-size: 11px; }
  .stat .value { color: var(--text); font-weight: 600; }
  h2 { font-size: 15px; color: var(--accent); margin-bottom: 8px; border-bottom: 1px solid #2a2a4a; padding-bottom: 4px; }
  #tasks { font-size: 12px; }
  #tasks li { color: var(--dim); margin-left: 16px; margin-bottom: 2px; }
  .conn-status { position: fixed; top: 8px; right: 340px; font-size: 11px; }
  .conn-ok { color: var(--success); }
  .conn-err { color: var(--fail); }
</style>
</head>
<body>
<div id="dialogue">
  <span class="conn-status" id="conn">connecting...</span>
  <div id="feed"></div>
  <div id="options-area"></div>
</div>
<div id="sidebar">
  <h2>Status</h2>
  <div class="stat-grid" id="stats"></div>
  <h2>Active Tasks</h2>
  <ul id="tasks"></ul>
</div>
<script>
const feed = document.getElementById('feed');
const optArea = document.getElementById('options-area');
const statsEl = document.getElementById('stats');
const tasksEl = document.getElementById('tasks');
const connEl = document.getElementById('conn');

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function addEntry(html) {
  const div = document.createElement('div');
  div.innerHTML = html;
  feed.appendChild(div);
  feed.parentElement.scrollTop = feed.parentElement.scrollHeight;
}

function updateStats(s) {
  statsEl.innerHTML = `
    <div class="stat"><div class="label">Scene</div><div class="value">${esc(s.scene)}</div></div>
    <div class="stat"><div class="label">Day / Hour</div><div class="value">${s.day} / ${s.hour}</div></div>
    <div class="stat"><div class="label">Money</div><div class="value">${s.money} reál</div></div>
    <div class="stat"><div class="label">Party</div><div class="value">${esc(s.party.join(', ') || 'alone')}</div></div>
    <div class="stat"><div class="label">Volition</div><div class="value">${s.skills.volition.current} (dmg ${s.skills.volition.damage})</div></div>
    <div class="stat"><div class="label">Endurance</div><div class="value">${s.skills.endurance.current} (dmg ${s.skills.endurance.damage})</div></div>
  `;
  tasksEl.innerHTML = s.activeTasks.length ? s.activeTasks.map(t => `<li>${esc(t)}</li>`).join('') : '<li style="color:#555">(none)</li>';
}

const ws = new WebSocket(`ws://${location.host}/ws`);
ws.onopen = () => { connEl.textContent = '● live'; connEl.className = 'conn-status conn-ok'; };
ws.onclose = () => { connEl.textContent = '● disconnected'; connEl.className = 'conn-status conn-err'; };

ws.onmessage = (ev) => {
  const msg = JSON.parse(ev.data);
  switch (msg.type) {
    case 'text':
      addEntry(`<div class="entry text"><div class="actor">${esc(msg.actorName || '?')}</div><div>${esc(msg.text)}</div></div>`);
      break;
    case 'check':
      const c = msg.result;
      addEntry(`<div class="entry check"><b>${esc(c.skill)}</b> (diff ${c.difficulty}, ${c.isRed ? 'RED' : 'WHITE'}) — rolled ${c.rolls[0]}+${c.rolls[1]}=${c.rolls[0]+c.rolls[1]}, total ${c.total} → <span class="${c.passed ? 'pass' : 'fail'}">${c.passed ? 'SUCCESS' : 'FAILURE'}</span></div>`);
      break;
    case 'choose':
      addEntry(`<div class="entry choose">▶ [${msg.index}] ${esc(msg.option.text)}</div>`);
      break;
    case 'options':
      optArea.innerHTML = `<div class="options"><h3>Options</h3>${msg.options.map(o => `<div class="option"><span class="idx">[${o.index}]</span>${esc(o.actorName ? o.actorName+': ' : '')}${esc(o.text)}</div>`).join('')}</div>`;
      break;
    case 'var_change':
      addEntry(`<div class="entry var">⚙ ${esc(msg.name)}: ${esc(String(msg.oldVal))} → ${esc(String(msg.newVal))}</div>`);
      break;
    case 'scene_end':
      addEntry(`<div class="entry scene-end">— scene ${msg.conv} ended —</div>`);
      break;
    case 'status':
      updateStats(msg.status);
      if (msg.history) for (const e of msg.history) {
        if (e.type === 'text') addEntry(`<div class="entry text"><div class="actor">${esc(e.actorName||'')}</div><div>${esc(e.text||'')}</div></div>`);
        else if (e.type === 'choose') addEntry(`<div class="entry choose">▶ [${e.optionIndex}] ${esc(e.optionText||'')}</div>`);
      }
      break;
  }
  if (msg.status) updateStats(msg.status);
};
</script>
</body>
</html>
